<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Hub</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;font-size:14px;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
  input,select,textarea{font-family:inherit;font-size:14px;border:1px solid #d0d0d0;border-radius:6px;padding:8px 10px;width:100%;outline:none;background:#fff;color:#1a1a1a}
  input:focus,select:focus,textarea:focus{border-color:#4a6cf7;box-shadow:0 0 0 2px rgba(74,108,247,.12)}
  button{font-family:inherit;font-size:13px;border-radius:6px;padding:7px 14px;cursor:pointer;border:1px solid #d0d0d0;background:#fff;color:#1a1a1a}
  button:hover{background:#f0f0f0}
  button.primary{background:#4a6cf7;color:#fff;border-color:#4a6cf7}
  button.primary:hover{background:#3a5ce7}
  button.danger{background:#fff;color:#d93025;border-color:#d93025}
  button.danger:hover{background:#fdf0ef}
  button.small{padding:4px 10px;font-size:12px}
  .page{display:none}
  .page.active{display:block}

  /* Login */
  #login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f5}
  .login-card{background:#fff;border-radius:12px;padding:40px;width:340px;border:1px solid #e0e0e0}
  .login-card h1{font-size:20px;font-weight:600;margin-bottom:4px}
  .login-card p{color:#666;font-size:13px;margin-bottom:24px}
  .login-card label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;margin-top:14px}
  .login-card button{width:100%;margin-top:20px;padding:10px}
  .error-msg{color:#d93025;font-size:12px;margin-top:8px;display:none}

  /* App shell */
  #app-page{min-height:100vh;display:flex;flex-direction:column}
  .topbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 20px;height:52px;display:flex;align-items:center;gap:12px}
  .topbar .logo{font-weight:600;font-size:15px;flex:1}
  .topbar .user-pill{font-size:12px;background:#eef0ff;color:#4a6cf7;border-radius:20px;padding:4px 12px;font-weight:500}
  .topbar button{border:none;background:none;color:#666;font-size:13px;padding:6px 10px}
  .topbar button:hover{background:#f5f5f5;border-radius:6px}

  .nav-tabs{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 20px;display:flex;gap:4px}
  .nav-tab{padding:12px 16px;font-size:13px;font-weight:500;color:#666;border:none;background:none;border-bottom:2px solid transparent;cursor:pointer;margin-bottom:-1px}
  .nav-tab.active{color:#4a6cf7;border-bottom-color:#4a6cf7}
  .nav-tab:hover:not(.active){color:#333}

  .main{padding:20px;flex:1}
  .section{display:none}
  .section.active{display:block}

  /* Toolbar row */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .toolbar input[type=text]{max-width:260px}
  .toolbar select{max-width:160px}
  .spacer{flex:1}

  /* Cards grid */
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .card{background:#fff;border-radius:10px;border:1px solid #e0e0e0;padding:16px;cursor:pointer;transition:border-color .15s}
  .card:hover{border-color:#4a6cf7}
  .card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
  .avatar{width:38px;height:38px;min-width:38px;border-radius:50%;background:#eef0ff;color:#4a6cf7;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px}
  .card-name{font-weight:600;font-size:14px}
  .card-company{font-size:12px;color:#666;margin-top:1px}
  .card-meta{font-size:12px;color:#888;display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
  .badge.email{background:#e8f0fe;color:#1a73e8}
  .badge.call{background:#e6f4ea;color:#1e8e3e}
  .badge.note{background:#fef9e7;color:#b06000}
  .badge.meeting{background:#fce8fd;color:#9334e6}
  .badge.task{background:#e8f5e9;color:#2e7d32}
  .badge.new{background:#fff3e0;color:#e65100}
  .badge.progress{background:#e3f2fd;color:#1565c0}
  .badge.done{background:#e8f5e9;color:#1b5e20}
  .assigned-pill{background:#f5f5f5;color:#555;border-radius:10px;padding:2px 8px;font-size:11px}

  /* Detail panel */
  .detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:flex-start;justify-content:flex-end}
  .detail-overlay.open{display:flex}
  .detail-panel{background:#fff;width:520px;max-width:100vw;height:100vh;overflow-y:auto;padding:24px;box-shadow:-4px 0 24px rgba(0,0,0,.1)}
  .detail-panel h2{font-size:17px;font-weight:600;margin-bottom:4px}
  .detail-panel .subtitle{font-size:13px;color:#666;margin-bottom:20px}
  .detail-close{float:right;background:none;border:none;font-size:20px;color:#888;cursor:pointer;line-height:1;margin-top:-4px}
  .field-row{margin-bottom:14px}
  .field-row label{display:block;font-size:12px;font-weight:500;color:#666;margin-bottom:4px}
  .field-group{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .detail-actions{display:flex;gap:8px;margin-top:8px;margin-bottom:20px;flex-wrap:wrap}
  .activities-list{margin-top:16px}
  .activity-item{background:#f9f9f9;border-radius:8px;padding:12px;margin-bottom:10px;border:1px solid #ebebeb}
  .activity-item:hover{border-color:#d0d0d0}
  .act-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .act-subject{font-weight:500;font-size:13px;flex:1}
  .act-body{font-size:13px;color:#444;white-space:pre-wrap;line-height:1.5}
  .act-footer{font-size:11px;color:#999;margin-top:6px;display:flex;gap:12px;align-items:center}
  .act-actions{margin-left:auto;display:flex;gap:6px}

  /* Modal form */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:12px;padding:24px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
  .modal h3{font-size:16px;font-weight:600;margin-bottom:18px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
  .modal .field-row{margin-bottom:12px}

  /* Activity feed */
  .feed-item{background:#fff;border-radius:8px;border:1px solid #e0e0e0;padding:14px;margin-bottom:10px}
  .feed-item .feed-header{display:flex;gap:8px;align-items:center;margin-bottom:6px}
  .feed-contact-link{font-size:12px;color:#4a6cf7;text-decoration:none;cursor:pointer}
  .feed-contact-link:hover{text-decoration:underline}

  /* Dashboard */
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:24px}
  .stat-card{background:#fff;border-radius:10px;border:1px solid #e0e0e0;padding:16px;text-align:center}
  .stat-card .num{font-size:28px;font-weight:600;color:#4a6cf7}
  .stat-card .lbl{font-size:12px;color:#888;margin-top:2px}

  /* Setup banner */
  .setup-banner{background:#fffbe6;border:1px solid #fdd835;border-radius:8px;padding:14px 16px;margin-bottom:20px;font-size:13px}
  .setup-banner strong{display:block;margin-bottom:4px}

  .empty-state{text-align:center;padding:48px 20px;color:#999}
  .empty-state .big{font-size:32px;margin-bottom:8px}
  .empty-state p{font-size:13px}

  @media(max-width:600px){
    .field-group{grid-template-columns:1fr}
    .detail-panel{width:100vw}
    .cards-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page" class="page active">
  <div class="login-card">
    <h1>Team Hub</h1>
    <p>Sign in to your team workspace</p>
    <label>Username</label>
    <input type="text" id="login-user" placeholder="your username" autocomplete="username">
    <label>Password</label>
    <input type="password" id="login-pass" placeholder="password" autocomplete="current-password">
    <div class="error-msg" id="login-error">Incorrect username or password.</div>
    <button class="primary" onclick="doLogin()">Sign in</button>
  </div>
</div>

<!-- APP -->
<div id="app-page" class="page">
  <div class="topbar">
    <span class="logo">Team Hub</span>
    <span class="user-pill" id="user-display"></span>
    <button onclick="doLogout()">Sign out</button>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showSection('dashboard')">Dashboard</button>
    <button class="nav-tab" onclick="showSection('contacts')">Contacts</button>
    <button class="nav-tab" onclick="showSection('feed')">Activity feed</button>
  </div>
  <div class="main">

    <!-- SETUP BANNER -->
    <div class="setup-banner" id="setup-banner" style="display:none">
      <strong>Setup required</strong>
      You need to set your Google Apps Script URL before data will save. 
      <a href="#" onclick="promptScriptUrl()">Click here to set it now</a>.
    </div>

    <!-- DASHBOARD -->
    <div class="section active" id="section-dashboard">
      <div class="stats-row" id="stats-row"></div>
      <h3 style="font-size:14px;font-weight:600;margin-bottom:12px;color:#444">Recent activity</h3>
      <div id="dashboard-feed"></div>
    </div>

    <!-- CONTACTS -->
    <div class="section" id="section-contacts">
      <div class="toolbar">
        <input type="text" id="contact-search" placeholder="Search contacts..." oninput="renderContacts()">
        <select id="contact-filter-assigned" onchange="renderContacts()">
          <option value="">All team members</option>
        </select>
        <div class="spacer"></div>
        <button class="primary" onclick="openContactModal()">+ Add contact</button>
      </div>
      <div class="cards-grid" id="contacts-grid"></div>
    </div>

    <!-- FEED -->
    <div class="section" id="section-feed">
      <div class="toolbar">
        <select id="feed-filter-type" onchange="renderFeed()">
          <option value="">All types</option>
          <option value="email">Email</option>
          <option value="call">Phone call</option>
          <option value="note">Note</option>
          <option value="meeting">Meeting</option>
          <option value="task">Task</option>
        </select>
        <select id="feed-filter-status" onchange="renderFeed()">
          <option value="">All statuses</option>
          <option value="new">New</option>
          <option value="progress">In progress</option>
          <option value="done">Done</option>
        </select>
        <select id="feed-filter-assigned" onchange="renderFeed()">
          <option value="">All team members</option>
        </select>
        <div class="spacer"></div>
        <button class="primary" onclick="openActivityModal(null)">+ Log activity</button>
      </div>
      <div id="feed-list"></div>
    </div>
  </div>
</div>

<!-- CONTACT DETAIL PANEL -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetailIfBackground(event)">
  <div class="detail-panel" id="detail-panel">
    <button class="detail-close" onclick="closeDetail()">x</button>
    <div id="detail-content"></div>
  </div>
</div>

<!-- CONTACT MODAL -->
<div class="modal-overlay" id="contact-modal-overlay">
  <div class="modal">
    <h3 id="contact-modal-title">Add contact</h3>
    <input type="hidden" id="cm-id">
    <div class="field-group">
      <div class="field-row"><label>Name *</label><input id="cm-name" placeholder="Full name"></div>
      <div class="field-row"><label>Company</label><input id="cm-company" placeholder="Company name"></div>
    </div>
    <div class="field-group">
      <div class="field-row"><label>Email</label><input id="cm-email" type="email" placeholder="email@example.com"></div>
      <div class="field-row"><label>Phone</label><input id="cm-phone" placeholder="+44 ..."></div>
    </div>
    <div class="field-row"><label>Address</label><input id="cm-address" placeholder="Street, city, postcode"></div>
    <div class="field-row"><label>Assigned to</label>
      <select id="cm-assigned"></select>
    </div>
    <div class="field-row"><label>Notes</label><textarea id="cm-notes" rows="3" placeholder="Any initial notes..."></textarea></div>
    <div class="modal-actions">
      <button onclick="closeContactModal()">Cancel</button>
      <button class="primary" onclick="saveContact()">Save contact</button>
    </div>
  </div>
</div>

<!-- ACTIVITY MODAL -->
<div class="modal-overlay" id="activity-modal-overlay">
  <div class="modal">
    <h3 id="activity-modal-title">Log activity</h3>
    <input type="hidden" id="am-id">
    <div class="field-group">
      <div class="field-row"><label>Type *</label>
        <select id="am-type">
          <option value="email">Email</option>
          <option value="call">Phone call</option>
          <option value="note">Note</option>
          <option value="meeting">Meeting</option>
          <option value="task">Task</option>
        </select>
      </div>
      <div class="field-row"><label>Status</label>
        <select id="am-status">
          <option value="new">New</option>
          <option value="progress">In progress</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>
    <div class="field-row"><label>Contact</label>
      <select id="am-contact"><option value="">-- No contact --</option></select>
    </div>
    <div class="field-row"><label>Subject *</label><input id="am-subject" placeholder="Brief subject line"></div>
    <div class="field-row"><label>Details</label><textarea id="am-body" rows="4" placeholder="Full details, notes, or content..."></textarea></div>
    <div class="field-row"><label>Progress / next step</label><input id="am-progress" placeholder="e.g. Awaiting reply, Follow up Friday..."></div>
    <div class="field-row"><label>Assigned to</label>
      <select id="am-assigned"></select>
    </div>
    <div class="modal-actions">
      <button onclick="closeActivityModal()">Cancel</button>
      <button class="primary" onclick="saveActivity()">Save</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL_KEY = 'teamhub_script_url';
let SCRIPT_URL = localStorage.getItem(SCRIPT_URL_KEY) || '';
let currentUser = null;
let contacts = [];
let activities = [];
let users = [];
let openContactId = null;
let editingActivityContactId = null;

function promptScriptUrl() {
  const url = prompt('Paste your Google Apps Script Web App URL here:', SCRIPT_URL);
  if (url && url.trim()) {
    SCRIPT_URL = url.trim();
    localStorage.setItem(SCRIPT_URL_KEY, SCRIPT_URL);
    document.getElementById('setup-banner').style.display = 'none';
    loadData();
  }
}

async function api(payload) {
  if (!SCRIPT_URL) throw new Error('No script URL set');
  const r = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload)
  });
  return r.json();
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id + '-page').classList.add('active');
}

function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach((t, i) => {
    const names = ['dashboard','contacts','feed'];
    t.classList.toggle('active', names[i] === name);
  });
  if (name === 'dashboard') renderDashboard();
  if (name === 'contacts') renderContacts();
  if (name === 'feed') renderFeed();
}

async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (!SCRIPT_URL) {
    const url = prompt('First time setup: paste your Google Apps Script Web App URL:');
    if (url && url.trim()) {
      SCRIPT_URL = url.trim();
      localStorage.setItem(SCRIPT_URL_KEY, SCRIPT_URL);
    } else { errEl.textContent = 'Script URL is required.'; errEl.style.display = 'block'; return; }
  }

  try {
    const res = await api({ action: 'login', username, password });
    if (res.success) {
      currentUser = { username: res.username, displayName: res.displayName };
      sessionStorage.setItem('teamhub_user', JSON.stringify(currentUser));
      showPage('app');
      document.getElementById('user-display').textContent = res.displayName;
      await loadData();
      renderDashboard();
    } else {
      errEl.textContent = res.error || 'Invalid credentials.';
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = 'Connection error. Check your script URL.';
    errEl.style.display = 'block';
  }
}

document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  sessionStorage.removeItem('teamhub_user');
  currentUser = null;
  showPage('login');
}

async function loadData() {
  try {
    const res = await api({ action: 'getAll' });
    if (res.success) {
      contacts = res.contacts || [];
      activities = res.activities || [];
      users = res.users || [];
      populateUserSelects();
    }
  } catch(e) {
    document.getElementById('setup-banner').style.display = 'block';
  }
}

function populateUserSelects() {
  const selects = ['cm-assigned','am-assigned','contact-filter-assigned','feed-filter-assigned'];
  selects.forEach(id => {
    const el = document.getElementById(id);
    const isFilter = id.includes('filter');
    const cur = el.value;
    el.innerHTML = isFilter ? '<option value="">All team members</option>' : '<option value="">Unassigned</option>';
    users.forEach(u => {
      const o = document.createElement('option');
      o.value = u.username;
      o.textContent = u.displayName;
      el.appendChild(o);
    });
    if (cur) el.value = cur;
  });
  const amContact = document.getElementById('am-contact');
  const curC = amContact.value;
  amContact.innerHTML = '<option value="">-- No contact --</option>';
  contacts.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = c.name + (c.company ? ' (' + c.company + ')' : '');
    amContact.appendChild(o);
  });
  if (curC) amContact.value = curC;
}

function getInitials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function getDisplayName(username) {
  if (!username) return '';
  const u = users.find(u => u.username === username);
  return u ? u.displayName : username;
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

function renderDashboard() {
  const stats = document.getElementById('stats-row');
  const openTasks = activities.filter(a => a.status !== 'done').length;
  const doneTasks = activities.filter(a => a.status === 'done').length;
  stats.innerHTML = `
    <div class="stat-card"><div class="num">${contacts.length}</div><div class="lbl">Contacts</div></div>
    <div class="stat-card"><div class="num">${activities.length}</div><div class="lbl">Activities</div></div>
    <div class="stat-card"><div class="num">${openTasks}</div><div class="lbl">Open</div></div>
    <div class="stat-card"><div class="num">${doneTasks}</div><div class="lbl">Done</div></div>
  `;
  const feed = document.getElementById('dashboard-feed');
  const recent = [...activities].sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||'')).slice(0,8);
  if (!recent.length) { feed.innerHTML = '<div class="empty-state"><p>No activity yet.</p></div>'; return; }
  feed.innerHTML = recent.map(a => {
    const c = contacts.find(x => x.id === a.contactId);
    return `<div class="feed-item">
      <div class="feed-header">
        <span class="badge ${a.type}">${a.type}</span>
        <strong style="font-size:13px;flex:1">${esc(a.subject)}</strong>
        <span class="badge ${a.status}">${a.status}</span>
      </div>
      ${c ? `<div style="font-size:12px;color:#666;margin-bottom:4px">Contact: <span class="feed-contact-link" onclick="openDetail('${c.id}')">${esc(c.name)}</span></div>` : ''}
      ${a.body ? `<div style="font-size:13px;color:#444;margin-bottom:4px">${esc(a.body).replace(/\n/g,'<br>')}</div>` : ''}
      ${a.progress ? `<div style="font-size:12px;color:#1565c0;margin-top:4px">Next: ${esc(a.progress)}</div>` : ''}
      <div style="font-size:11px;color:#999;margin-top:6px">${getDisplayName(a.assignedTo) || 'Unassigned'} &middot; ${fmtDate(a.createdAt)}</div>
    </div>`;
  }).join('');
}

function renderContacts() {
  const q = (document.getElementById('contact-search').value || '').toLowerCase();
  const assigned = document.getElementById('contact-filter-assigned').value;
  let filtered = contacts.filter(c => {
    const match = !q || (c.name||'').toLowerCase().includes(q) || (c.company||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q);
    const aMatch = !assigned || c.assignedTo === assigned;
    return match && aMatch;
  });
  const grid = document.getElementById('contacts-grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="big">&#128100;</div><p>${contacts.length ? 'No contacts match your search.' : 'No contacts yet. Add your first one.'}</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(c => {
    const acts = activities.filter(a => a.contactId === c.id);
    const open = acts.filter(a => a.status !== 'done').length;
    return `<div class="card" onclick="openDetail('${c.id}')">
      <div class="card-header">
        <div class="avatar">${getInitials(c.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="card-name">${esc(c.name)}</div>
          <div class="card-company">${esc(c.company||'')}</div>
        </div>
      </div>
      <div style="font-size:12px;color:#555">${c.email ? esc(c.email) : ''}</div>
      ${c.phone ? `<div style="font-size:12px;color:#555">${esc(c.phone)}</div>` : ''}
      <div class="card-meta">
        ${c.assignedTo ? `<span class="assigned-pill">${getDisplayName(c.assignedTo)}</span>` : ''}
        ${acts.length ? `<span>${acts.length} activit${acts.length===1?'y':'ies'}</span>` : ''}
        ${open ? `<span style="color:#e65100">${open} open</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderFeed() {
  const type = document.getElementById('feed-filter-type').value;
  const status = document.getElementById('feed-filter-status').value;
  const assigned = document.getElementById('feed-filter-assigned').value;
  let filtered = activities.filter(a => {
    return (!type || a.type === type) && (!status || a.status === status) && (!assigned || a.assignedTo === assigned);
  }).sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));

  const list = document.getElementById('feed-list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="big">&#128203;</div><p>${activities.length ? 'No activities match your filters.' : 'No activities logged yet.'}</p></div>`;
    return;
  }
  list.innerHTML = filtered.map(a => {
    const c = contacts.find(x => x.id === a.contactId);
    return `<div class="feed-item">
      <div class="feed-header">
        <span class="badge ${a.type}">${a.type}</span>
        <strong style="font-size:13px;flex:1">${esc(a.subject)}</strong>
        <span class="badge ${a.status}">${a.status}</span>
        <div style="display:flex;gap:6px;margin-left:8px">
          <button class="small" onclick="openActivityModal('${a.id}')">Edit</button>
          <button class="small danger" onclick="deleteActivity('${a.id}')">Delete</button>
        </div>
      </div>
      ${c ? `<div style="font-size:12px;color:#666;margin-bottom:4px">Contact: <span class="feed-contact-link" onclick="openDetail('${c.id}')">${esc(c.name)}</span></div>` : ''}
      ${a.body ? `<div style="font-size:13px;color:#444;margin-bottom:4px">${esc(a.body).replace(/\n/g,'<br>')}</div>` : ''}
      ${a.progress ? `<div style="font-size:12px;color:#1565c0;margin-top:4px">Next: ${esc(a.progress)}</div>` : ''}
      <div style="font-size:11px;color:#999;margin-top:6px">${getDisplayName(a.assignedTo) || 'Unassigned'} &middot; ${fmtDate(a.createdAt)}</div>
    </div>`;
  }).join('');
}

function openDetail(contactId) {
  openContactId = contactId;
  const c = contacts.find(x => x.id === contactId);
  if (!c) return;
  const acts = activities.filter(a => a.contactId === contactId).sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
  const panel = document.getElementById('detail-content');
  panel.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="avatar" style="width:48px;height:48px;font-size:16px">${getInitials(c.name)}</div>
      <div><h2>${esc(c.name)}</h2><div class="subtitle">${esc(c.company||'')} ${c.assignedTo ? '&middot; Assigned to ' + getDisplayName(c.assignedTo) : ''}</div></div>
    </div>
    <div class="detail-actions">
      <button onclick="openContactModal('${c.id}')">Edit contact</button>
      <button class="primary" onclick="openActivityModal(null,'${c.id}')">+ Log activity</button>
      <button class="danger small" style="margin-left:auto" onclick="deleteContact('${c.id}')">Delete contact</button>
    </div>
    <table style="width:100%;font-size:13px;border-collapse:collapse;margin-bottom:16px">
      ${c.email ? `<tr><td style="color:#888;padding:5px 0;width:80px">Email</td><td><a href="mailto:${esc(c.email)}">${esc(c.email)}</a></td></tr>` : ''}
      ${c.phone ? `<tr><td style="color:#888;padding:5px 0">Phone</td><td>${esc(c.phone)}</td></tr>` : ''}
      ${c.address ? `<tr><td style="color:#888;padding:5px 0">Address</td><td>${esc(c.address)}</td></tr>` : ''}
      ${c.notes ? `<tr><td style="color:#888;padding:5px 0;vertical-align:top">Notes</td><td style="white-space:pre-wrap">${esc(c.notes)}</td></tr>` : ''}
    </table>
    <div style="font-size:13px;font-weight:600;color:#444;margin-bottom:10px">Activities (${acts.length})</div>
    <div class="activities-list" id="detail-acts"></div>
  `;
  const actsEl = document.getElementById('detail-acts');
  if (!acts.length) {
    actsEl.innerHTML = '<div style="color:#aaa;font-size:13px">No activities yet.</div>';
  } else {
    actsEl.innerHTML = acts.map(a => `
      <div class="activity-item">
        <div class="act-header">
          <span class="badge ${a.type}">${a.type}</span>
          <span class="act-subject">${esc(a.subject)}</span>
          <span class="badge ${a.status}">${a.status}</span>
        </div>
        ${a.body ? `<div class="act-body">${esc(a.body)}</div>` : ''}
        ${a.progress ? `<div style="font-size:12px;color:#1565c0;margin-top:4px">Next: ${esc(a.progress)}</div>` : ''}
        <div class="act-footer">
          <span>${getDisplayName(a.assignedTo)||'Unassigned'} &middot; ${fmtDate(a.createdAt)}</span>
          <div class="act-actions">
            <button class="small" onclick="openActivityModal('${a.id}')">Edit</button>
            <button class="small danger" onclick="deleteActivity('${a.id}')">Delete</button>
          </div>
        </div>
      </div>
    `).join('');
  }
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  openContactId = null;
}

function closeDetailIfBackground(e) {
  if (e.target === document.getElementById('detail-overlay')) closeDetail();
}

function openContactModal(id) {
  const modal = document.getElementById('contact-modal-overlay');
  document.getElementById('contact-modal-title').textContent = id ? 'Edit contact' : 'Add contact';
  document.getElementById('cm-id').value = '';
  ['name','company','email','phone','address','notes'].forEach(f => document.getElementById('cm-'+f).value = '');
  document.getElementById('cm-assigned').value = '';
  if (id) {
    const c = contacts.find(x => x.id === id);
    if (c) {
      document.getElementById('cm-id').value = c.id;
      document.getElementById('cm-name').value = c.name || '';
      document.getElementById('cm-company').value = c.company || '';
      document.getElementById('cm-email').value = c.email || '';
      document.getElementById('cm-phone').value = c.phone || '';
      document.getElementById('cm-address').value = c.address || '';
      document.getElementById('cm-notes').value = c.notes || '';
      document.getElementById('cm-assigned').value = c.assignedTo || '';
    }
  }
  modal.classList.add('open');
}

function closeContactModal() {
  document.getElementById('contact-modal-overlay').classList.remove('open');
}

async function saveContact() {
  const name = document.getElementById('cm-name').value.trim();
  if (!name) { alert('Name is required.'); return; }
  const contact = {
    id: document.getElementById('cm-id').value || null,
    name,
    company: document.getElementById('cm-company').value.trim(),
    email: document.getElementById('cm-email').value.trim(),
    phone: document.getElementById('cm-phone').value.trim(),
    address: document.getElementById('cm-address').value.trim(),
    notes: document.getElementById('cm-notes').value.trim(),
    assignedTo: document.getElementById('cm-assigned').value,
    createdBy: currentUser.username
  };
  try {
    const res = await api({ action: 'saveContact', contact });
    if (res.success) {
      if (contact.id) {
        contacts = contacts.map(c => c.id === res.contact.id ? res.contact : c);
      } else {
        contacts.push(res.contact);
      }
      populateUserSelects();
      closeContactModal();
      renderContacts();
      if (openContactId === contact.id) openDetail(contact.id);
      renderDashboard();
    } else { alert('Error: ' + res.error); }
  } catch(e) { alert('Connection error. Data not saved.'); }
}

async function deleteContact(id) {
  if (!confirm('Delete this contact and all their activities? This cannot be undone.')) return;
  try {
    const res = await api({ action: 'deleteContact', id });
    if (res.success) {
      contacts = contacts.filter(c => c.id !== id);
      activities = activities.filter(a => a.contactId !== id);
      closeDetail();
      renderContacts();
      renderDashboard();
    }
  } catch(e) { alert('Connection error.'); }
}

function openActivityModal(actId, contactId) {
  editingActivityContactId = contactId || null;
  document.getElementById('activity-modal-title').textContent = actId ? 'Edit activity' : 'Log activity';
  document.getElementById('am-id').value = '';
  document.getElementById('am-type').value = 'note';
  document.getElementById('am-status').value = 'new';
  document.getElementById('am-subject').value = '';
  document.getElementById('am-body').value = '';
  document.getElementById('am-progress').value = '';
  document.getElementById('am-assigned').value = currentUser ? currentUser.username : '';
  document.getElementById('am-contact').value = contactId || '';

  if (actId) {
    const a = activities.find(x => x.id === actId);
    if (a) {
      document.getElementById('am-id').value = a.id;
      document.getElementById('am-type').value = a.type || 'note';
      document.getElementById('am-status').value = a.status || 'new';
      document.getElementById('am-subject').value = a.subject || '';
      document.getElementById('am-body').value = a.body || '';
      document.getElementById('am-progress').value = a.progress || '';
      document.getElementById('am-assigned').value = a.assignedTo || '';
      document.getElementById('am-contact').value = a.contactId || '';
    }
  }
  document.getElementById('activity-modal-overlay').classList.add('open');
}

function closeActivityModal() {
  document.getElementById('activity-modal-overlay').classList.remove('open');
}

async function saveActivity() {
  const subject = document.getElementById('am-subject').value.trim();
  if (!subject) { alert('Subject is required.'); return; }
  const activity = {
    id: document.getElementById('am-id').value || null,
    type: document.getElementById('am-type').value,
    status: document.getElementById('am-status').value,
    contactId: document.getElementById('am-contact').value,
    subject,
    body: document.getElementById('am-body').value.trim(),
    progress: document.getElementById('am-progress').value.trim(),
    assignedTo: document.getElementById('am-assigned').value,
    createdBy: currentUser.username
  };
  try {
    const res = await api({ action: 'saveActivity', activity });
    if (res.success) {
      if (activity.id) {
        activities = activities.map(a => a.id === res.activity.id ? res.activity : a);
      } else {
        activities.push(res.activity);
      }
      closeActivityModal();
      renderFeed();
      renderDashboard();
      if (openContactId) openDetail(openContactId);
      renderContacts();
    } else { alert('Error: ' + res.error); }
  } catch(e) { alert('Connection error. Data not saved.'); }
}

async function deleteActivity(id) {
  if (!confirm('Delete this activity?')) return;
  try {
    const res = await api({ action: 'deleteActivity', id });
    if (res.success) {
      activities = activities.filter(a => a.id !== id);
      renderFeed();
      renderDashboard();
      if (openContactId) openDetail(openContactId);
      renderContacts();
    }
  } catch(e) { alert('Connection error.'); }
}

function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const saved = sessionStorage.getItem('teamhub_user');
if (saved) {
  currentUser = JSON.parse(saved);
  showPage('app');
  document.getElementById('user-display').textContent = currentUser.displayName;
  if (!SCRIPT_URL) {
    document.getElementById('setup-banner').style.display = 'block';
  } else {
    loadData().then(() => renderDashboard());
  }
}
</script>
</body>
</html>
